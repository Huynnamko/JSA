<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="register.css">
    <link rel="icon" href="images/weather icon.png">
</head>

<body>
    <!-- REGISTER CARD -->
    <div class="card">
        <div class="form-container">
            <h2>Register</h2>
            <form id="registerForm" class="form">

                <div class="field">
                    <label for="txt_name">Full Name</label>
                    <input id="txt_name" type="text" placeholder="Enter your full name" required>
                </div>

                <div class="field">
                    <label for="txt_email">Email Address</label>
                    <input id="txt_email" type="email" placeholder="Enter your email" required>
                </div>

                <div class="field">
                    <label for="txt_password">Password</label>
                    <input id="txt_password" type="password" placeholder="Enter your password" required>
                </div>

                <div class="field">
                    <label for="txt_confirm_password">Confirm Password</label>
                    <input id="txt_confirm_password" type="password" placeholder="Confirm your password" required>
                </div>

                <div class="field">
                    <label for="txt_birthday">Birthday</label>
                    <input id="txt_birthday" type="date" required>
                </div>

                <div class="field">
                    <label for="txt_gender">Gender</label>
                    <select id="txt_gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="actions">
                    <button type="submit" class="register-btn">Register</button>
                </div>

            </form>

            <div class="login-link">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const name = document.getElementById('txt_name').value;
            const email = document.getElementById('txt_email').value;
            const password = document.getElementById('txt_password').value;
            const confirmPassword = document.getElementById('txt_confirm_password').value;
            const birthday = document.getElementById('txt_birthday').value;
            const gender = document.getElementById('txt_gender').value;

            // Validate inputs
            if (!name || !email || !password || !confirmPassword || !birthday || !gender) {
                alert('Please fill in all fields');
                return;
            }

            // Check if passwords match
            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            // Check password length
            if (password.length < 6) {
                alert('Password must be at least 6 characters long');
                return;
            }

            // Get existing users from localStorage
            const registeredUsers = JSON.parse(localStorage.getItem('users') || '[]');

            // Check if email already exists
            if (registeredUsers.some(u => u.email === email)) {
                alert('Email already registered');
                return;
            }

            // Create new user
            const newUser = {
                name: name,
                email: email,
                password: password,
                birthday: birthday,
                gender: gender
            };

            // Add user to localStorage
            registeredUsers.push(newUser);
            localStorage.setItem('users', JSON.stringify(registeredUsers));

            // Store current logged-in user
            localStorage.setItem('currentUser', JSON.stringify({
                name: newUser.name,
                email: newUser.email,
                birthday: newUser.birthday,
                gender: newUser.gender
            }));

            alert('Registration successful! Welcome!');
            // Redirect to login.html
            window.location.href = 'login.html';
        });
    </script>

</body>

</html>
