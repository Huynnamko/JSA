<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="icon" href="images/weather icon.png">
</head>

<body>
    <!-- LOGIN CARD -->
    <div class="card">
        <div class="form-container">
            <h2>Login</h2>
            <form id="loginForm" class="form">

                <div class="field">
                    <label for="txt_email">Email Address</label>
                    <input id="txt_email" type="email" placeholder="Enter your email" required>
                </div>

                <div class="field">
                    <label for="txt_password">Password</label>
                    <input id="txt_password" type="password" placeholder="Enter your password" required>
                </div>

                <div class="actions">
                    <button type="submit" class="login-btn">Login</button>
                </div>

            </form>

            <div class="register-link">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('txt_email').value;
            const password = document.getElementById('txt_password').value;

            // Validate inputs
            if (!email || !password) {
                alert('Please fill in all fields');
                return;
            }

            // Get registered users from localStorage
            const registeredUsers = JSON.parse(localStorage.getItem('users') || '[]');
            
            // Check if user exists and password is correct
            const user = registeredUsers.find(u => u.email === email && u.password === password);

            if (user) {
                // Store current logged-in user
                localStorage.setItem('currentUser', JSON.stringify({
                    name: user.name,
                    email: user.email,
                    birthday: user.birthday,
                    gender: user.gender
                }));
                alert('Login successful!');
                // Redirect to index.html
                window.location.href = 'index.html';
            } else {
                alert('Invalid email or password');
            }
        });
    </script>

</body>

</html>
